version: '3.8'

services:
  hyper-trader:
    build: .
    container_name: hyper-trader
    ports:
      - "5000:5000"
    volumes:
      # Persist the SQLite database between restarts
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped
    # Auto-restart on crash
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
